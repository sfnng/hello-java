name: Polaris SCA Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  polaris-sca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download Polaris CLI
        run: |
          JWT=$(curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -d "{\"accesstoken\":\"${{ secrets.POLARIS_ACCESS_TOKEN }}\"}" \
            "${{ secrets.POLARIS_SERVER_URL }}/api/auth/v2/authenticate" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['jwt'])")
          curl -fsSLo polaris.zip \
            -H "Authorization: Bearer ${JWT}" \
            "${{ secrets.POLARIS_SERVER_URL }}/api/tools/polaris_cli-linux64.zip"
          unzip -q polaris.zip
          chmod +x polaris
          ./polaris --version

      - name: Run Polaris SCA scan
        env:
          POLARIS_SERVER_URL: ${{ secrets.POLARIS_SERVER_URL }}
          POLARIS_ACCESS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
        run: |
          ./polaris analyze -w \
            --coverity.enabled=false \
            --sca.enabled=true
